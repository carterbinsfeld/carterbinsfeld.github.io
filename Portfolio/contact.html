<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="styles/portfolio.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg"></div>

<main class="page">
  <div class="contact-layout">
    <div class="contact-header">
      <p class="contact-eyebrow">Get in touch</p>
      <h1 class="contact-title">Let's work<br>together.</h1>
      <div class="contact-rule"></div>
      <p class="contact-blurb">Whether you have a project in mind, want to say hi, or saw a funny picture you'd think I like, send me a message!</p>
      <div class="contact-links">
        <a class="contact-link" href="https://linkedin.com/in/carter-binsfeld-416136254/" target="_blank">LinkedIn</a>
      </div>
    </div>
<form class="contact-form" action="https://www.form-to-email.com/api/s/spXuIIK5rmVa" method="POST" enctype="multipart/form-data">
    <div class="field-row">
    <div class="field">
        <label>Name:
        <input type="text" name="name" placeholder="Your name" autocomplete="name" required />
    </label>
    </div>
    <div class="field">
    <label>Email address:
        <input type="email" name="email" placeholder="da address please" autocomplete="email" required />
    </label>
    </div>
    </div>
        <div class="field">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Speak your words" required></textarea>
        </div>
        <button class="submit-button" type="submit">Submit</button>
    </form>
  </div>
</main>



<nav>
  <a href="portfolio.html">Home</a>
  <a href="works.html">Works</a>
  <a href="about.html">About</a>
  <a href="contact.html" class="active">Contact</a>
</nav>

</body>
</html>
